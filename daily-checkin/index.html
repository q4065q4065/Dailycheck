<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="每日簽到"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>每日簽到</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #9a9a94;
  --paper: #fafaf8;
  --paper2: #f2f2ee;
  --paper3: #e8e8e2;
  --accent: #1a1a18;
  --green: #2d6a4f;
  --green-bg: #d8f3dc;
  --blue: #1d5fa0;
  --blue-bg: #dbeafe;
  --purple: #5b3fa0;
  --purple-bg: #ede9fe;
  --amber: #92570a;
  --amber-bg: #fef3c7;
  --red: #b91c1c;
  --red-bg: #fee2e2;
  --r: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ── Header ── */
.topbar { padding: 16px 20px 0; flex-shrink: 0; }
.topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.topbar-date { font-size: 13px; color: var(--ink3); }
.topbar-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 600; color: var(--ink); }
.streak-pill { display: flex; align-items: center; gap: 5px; background: var(--ink); color: var(--paper); border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 500; }
.flame { font-size: 14px; }

/* ── Progress ── */
.prog-wrap { padding: 14px 20px; flex-shrink: 0; }
.prog-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink2); margin-bottom: 8px; }
.prog-nums { font-weight: 500; color: var(--ink); }
.prog-bar { height: 5px; background: var(--paper3); border-radius: 999px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--ink); border-radius: 999px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ── Tabs ── */
.tabs { display: flex; gap: 6px; padding: 0 20px 12px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 5px 14px; border-radius: 999px; border: 1px solid var(--paper3); font-size: 13px; cursor: pointer; background: transparent; color: var(--ink3); white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.tab.on { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 500; }

/* ── Scroll area ── */
.scroll { flex: 1; overflow-y: auto; padding: 0 20px; scrollbar-width: thin; scrollbar-color: var(--paper3) transparent; }
.scroll::-webkit-scrollbar { width: 4px; }
.scroll::-webkit-scrollbar-thumb { background: var(--paper3); border-radius: 2px; }

/* ── Section labels ── */
.section-label { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.08em; text-transform: uppercase; margin: 16px 0 8px; }
.section-label:first-child { margin-top: 4px; }

/* ── Task card ── */
.task-card { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid var(--paper3); border-radius: var(--r); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, opacity 0.2s; user-select: none; }
.task-card:active { opacity: 0.7; }
.task-card.done { opacity: 0.5; }
.task-card.done .task-name { text-decoration: line-through; color: var(--ink3); }
.chk { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--paper3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: white; }
.task-card.done .chk { background: var(--ink); border-color: var(--ink); }
.chk svg { opacity: 0; transition: opacity 0.15s; }
.task-card.done .chk svg { opacity: 1; }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
.task-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 999px; }
.fixed-badge { background: var(--paper2); color: var(--ink3); font-size: 10px; }
.task-del { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 18px; line-height: 1; padding: 4px; font-family: sans-serif; transition: color 0.15s; }
.task-del:hover { color: var(--red); }
.empty { text-align: center; padding: 3rem 0; color: var(--ink3); font-size: 14px; }

/* ── Add bar ── */
.addbar { padding: 12px 20px; border-top: 1px solid var(--paper3); flex-shrink: 0; background: var(--paper); }
.add-row { display: flex; gap: 8px; margin-bottom: 8px; }
.add-input { flex: 1; padding: 9px 13px; border-radius: var(--r); border: 1px solid var(--paper3); background: white; font-size: 14px; color: var(--ink); font-family: 'Noto Sans TC', sans-serif; outline: none; transition: border-color 0.15s; }
.add-input:focus { border-color: var(--ink); }
.add-btn { padding: 9px 18px; border-radius: var(--r); background: var(--ink); color: var(--paper); border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap; }
.add-opts { display: flex; gap: 8px; align-items: center; }
.add-select { padding: 7px 10px; border-radius: 8px; border: 1px solid var(--paper3); background: white; font-size: 13px; color: var(--ink2); font-family: 'Noto Sans TC', sans-serif; outline: none; }
.type-toggle { display: flex; gap: 0; border: 1px solid var(--paper3); border-radius: 8px; overflow: hidden; }
.type-btn { padding: 6px 12px; font-size: 12px; border: none; background: white; color: var(--ink3); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.type-btn.on { background: var(--ink); color: var(--paper); font-weight: 500; }

/* ── Stats view ── */
.stats-view { padding: 20px; overflow-y: auto; flex: 1; }
.stats-header { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 600; margin-bottom: 20px; }
.stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-box { background: white; border: 1px solid var(--paper3); border-radius: var(--r); padding: 14px 16px; }
.stat-lbl { font-size: 12px; color: var(--ink3); margin-bottom: 6px; }
.stat-num { font-size: 26px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
.stat-unit { font-size: 13px; color: var(--ink3); font-weight: 400; }
.week-grid { background: white; border: 1px solid var(--paper3); border-radius: var(--r); padding: 14px 16px; margin-bottom: 20px; }
.week-title { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 12px; }
.week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-dot { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--paper2); }
.day-dot.full { background: var(--ink); }
.day-dot.partial { background: var(--paper3); }
.day-dot.today-marker { border: 1.5px solid var(--ink); }
.day-lbl { font-size: 10px; color: var(--ink3); margin-bottom: 3px; }
.day-dot.full .day-lbl { color: var(--paper); opacity: 0.7; }
.day-pct { font-size: 11px; font-weight: 500; color: var(--ink3); }
.day-dot.full .day-pct { color: var(--paper); }
.cat-stat-list { background: white; border: 1px solid var(--paper3); border-radius: var(--r); padding: 14px 16px; }
.cat-stat-title { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 12px; }
.cat-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.cat-stat-row:last-child { margin-bottom: 0; }
.cat-stat-name { font-size: 13px; color: var(--ink2); width: 40px; flex-shrink: 0; }
.cat-stat-bar-bg { flex: 1; height: 6px; background: var(--paper2); border-radius: 999px; overflow: hidden; }
.cat-stat-bar { height: 100%; border-radius: 999px; transition: width 0.5s; }
.cat-stat-val { font-size: 12px; color: var(--ink3); width: 32px; text-align: right; }

/* ── Settings view ── */
.settings-view { padding: 20px; overflow-y: auto; flex: 1; }
.settings-header { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 600; margin-bottom: 20px; }
.settings-section { margin-bottom: 24px; }
.settings-section-title { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.08em; margin-bottom: 10px; }
.settings-card { background: white; border: 1px solid var(--paper3); border-radius: var(--r); overflow: hidden; }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--paper3); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.settings-row-text { flex: 1; }
.settings-row-label { font-size: 14px; font-weight: 500; color: var(--ink); }
.settings-row-sub { font-size: 12px; color: var(--ink3); margin-top: 1px; }
.settings-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--paper3); background: white; font-size: 13px; color: var(--ink2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
.settings-btn.danger { color: var(--red); border-color: var(--red-bg); background: var(--red-bg); }
.fixed-task-list { display: flex; flex-direction: column; gap: 8px; }
.fixed-task-item { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid var(--paper3); border-radius: var(--r); padding: 10px 12px; }
.fixed-task-item-name { flex: 1; font-size: 14px; color: var(--ink); }
.fixed-task-cat { font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
.add-fixed-row { display: flex; gap: 8px; margin-top: 8px; }
.add-fixed-input { flex: 1; padding: 9px 13px; border-radius: var(--r); border: 1px solid var(--paper3); background: white; font-size: 14px; color: var(--ink); font-family: 'Noto Sans TC', sans-serif; outline: none; }
.add-fixed-input:focus { border-color: var(--ink); }
.add-fixed-btn { padding: 9px 14px; border-radius: var(--r); background: var(--ink); color: var(--paper); border: none; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

/* ── Bottom nav ── */
.bottomnav { display: flex; border-top: 1px solid var(--paper3); flex-shrink: 0; background: var(--paper); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; gap: 4px; background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 10px; font-family: 'Noto Sans TC', sans-serif; transition: color 0.15s; }
.nav-btn.on { color: var(--ink); }
.nav-btn svg { width: 22px; height: 22px; }

/* ── Animations ── */
@keyframes popIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.task-card { animation: popIn 0.18s ease; }

/* ── Install banner ── */
#install-banner { display: none; position: fixed; bottom: calc(72px + var(--safe-bottom)); left: 16px; right: 16px; background: var(--ink); color: var(--paper); border-radius: var(--r); padding: 14px 16px; z-index: 100; }
#install-banner.show { display: flex; align-items: center; gap: 12px; }
.install-text { flex: 1; font-size: 13px; line-height: 1.4; }
.install-text strong { font-weight: 500; display: block; margin-bottom: 2px; }
.install-text span { color: rgba(255,255,255,0.6); font-size: 12px; }
.install-ok { padding: 8px 16px; background: white; color: var(--ink); border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap; }
.install-x { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; line-height: 1; padding: 4px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── TODAY VIEW ── -->
  <div class="view active" id="view-today">
    <div class="topbar">
      <div class="topbar-row">
        <div>
          <div class="topbar-date" id="today-date"></div>
          <div class="topbar-title">每日簽到</div>
        </div>
        <div class="streak-pill">
          <span class="flame">🔥</span>
          <span id="streak-num">0</span> 天
        </div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-info">
        <span>今日進度</span>
        <span class="prog-nums"><span id="done-count">0</span> / <span id="total-count">0</span> 完成</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="tabs" id="cat-tabs"></div>
    <div class="scroll" id="task-scroll">
      <div id="task-list-fixed"></div>
      <div id="task-list-today"></div>
    </div>
    <div class="addbar">
      <div class="add-row">
        <input class="add-input" id="add-input" placeholder="新增任務..." type="text" autocomplete="off"/>
        <button class="add-btn" onclick="addTask()">新增</button>
      </div>
      <div class="add-opts">
        <select class="add-select" id="add-cat">
          <option value="健康">健康</option>
          <option value="工作">工作</option>
          <option value="學習">學習</option>
          <option value="生活">生活</option>
        </select>
        <div class="type-toggle">
          <button class="type-btn on" id="type-today" onclick="setType('today')">今日</button>
          <button class="type-btn" id="type-fixed" onclick="setType('fixed')">每日固定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── STATS VIEW ── -->
  <div class="view" id="view-stats">
    <div class="stats-view" id="stats-content"></div>
  </div>

  <!-- ── SETTINGS VIEW ── -->
  <div class="view" id="view-settings">
    <div class="settings-view" id="settings-content"></div>
  </div>

  <!-- ── Bottom Nav ── -->
  <div class="bottomnav">
    <button class="nav-btn on" id="nav-today" onclick="showView('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      今日
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showView('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      統計
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showView('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      設定
    </button>
  </div>
</div>

<div id="install-banner">
  <div class="install-text">
    <strong>安裝為 App</strong>
    <span>加到主畫面，離線也能使用</span>
  </div>
  <button class="install-ok" id="install-ok-btn">安裝</button>
  <button class="install-x" onclick="dismissInstall()">×</button>
</div>

<script>
// ── Data layer ──
const KEY = 'checkin_v3';
const TODAY_STR = new Date().toDateString();

const CAT_STYLE = {
  健康: { bg:'#d8f3dc', color:'#2d6a4f' },
  工作: { bg:'#dbeafe', color:'#1d5fa0' },
  學習: { bg:'#ede9fe', color:'#5b3fa0' },
  生活: { bg:'#fef3c7', color:'#92570a' },
  其他: { bg:'#f2f2ee', color:'#4a4a46' },
};

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) return JSON.parse(r);
  } catch(e) {}
  return {
    fixedTasks: [
      { id:'f1', name:'喝 2000ml 水', cat:'健康' },
      { id:'f2', name:'運動 30 分鐘', cat:'健康' },
      { id:'f3', name:'讀書 20 分鐘', cat:'學習' },
    ],
    todayTasks: [],
    doneMap: {},   // "taskId_dateStr": true
    history: {},   // dateStr: { done, total }
    streak: 0,
    lastFullDate: null,
  };
}

function save() { try { localStorage.setItem(KEY, JSON.stringify(D)); } catch(e) {} }

let D = load();

// ── Migrate today's task list each new day ──
function getTodayTasks() {
  return D.todayTasks.filter(t => t.date === TODAY_STR);
}

function isDone(id) { return !!D.doneMap[id + '_' + TODAY_STR]; }

function setDone(id, val) {
  const k = id + '_' + TODAY_STR;
  if (val) D.doneMap[k] = true; else delete D.doneMap[k];
  updateStreakAndHistory();
  save();
}

function updateStreakAndHistory() {
  const allIds = [...D.fixedTasks.map(t=>t.id), ...getTodayTasks().map(t=>t.id)];
  const total = allIds.length;
  const done = allIds.filter(id => isDone(id)).length;
  D.history[TODAY_STR] = { done, total };

  if (total > 0 && done === total) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toDateString();
    if (D.lastFullDate === yStr) {
      D.streak = (D.streak || 0) + 1;
    } else if (D.lastFullDate !== TODAY_STR) {
      D.streak = 1;
    }
    D.lastFullDate = TODAY_STR;
  }
}

// ── UI state ──
let activeTab = '全部';
let addType = 'today';

function setType(t) {
  addType = t;
  document.getElementById('type-today').classList.toggle('on', t==='today');
  document.getElementById('type-fixed').classList.toggle('on', t==='fixed');
}

// ── View routing ──
function showView(v) {
  ['today','stats','settings'].forEach(n => {
    document.getElementById('view-'+n).classList.toggle('active', n===v);
    document.getElementById('nav-'+n).classList.toggle('on', n===v);
  });
  if (v==='stats') renderStats();
  if (v==='settings') renderSettings();
}

// ── Date helpers ──
const DAYS_ZH = ['日','一','二','三','四','五','六'];
function formatDate(d) {
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日　星期${DAYS_ZH[d.getDay()]}`;
}

// ── Render today ──
function render() {
  document.getElementById('today-date').textContent = formatDate(new Date());
  document.getElementById('streak-num').textContent = D.streak || 0;

  const todayTasks = getTodayTasks();
  const allTasks = [...D.fixedTasks, ...todayTasks];
  const total = allTasks.length;
  const done = allTasks.filter(t => isDone(t.id)).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('prog-fill').style.width = pct + '%';

  // Tabs
  const cats = ['全部', ...new Set(allTasks.map(t=>t.cat))];
  if (!cats.includes(activeTab)) activeTab = '全部';
  document.getElementById('cat-tabs').innerHTML = cats.map(c =>
    `<button class="tab${activeTab===c?' on':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');

  // Fixed tasks
  const fixedFiltered = activeTab === '全部' ? D.fixedTasks : D.fixedTasks.filter(t=>t.cat===activeTab);
  const fixedHTML = fixedFiltered.length ? `
    <div class="section-label">每日固定</div>
    ${fixedFiltered.map(t => taskCardHTML(t, true)).join('')}` : '';

  // Today-only tasks
  const todayFiltered = activeTab === '全部' ? todayTasks : todayTasks.filter(t=>t.cat===activeTab);
  const todayHTML = todayFiltered.length ? `
    <div class="section-label">今日任務</div>
    ${todayFiltered.map(t => taskCardHTML(t, false)).join('')}` : '';

  document.getElementById('task-list-fixed').innerHTML = fixedHTML;
  document.getElementById('task-list-today').innerHTML = todayHTML;

  if (!fixedFiltered.length && !todayFiltered.length) {
    document.getElementById('task-list-today').innerHTML = `<div class="empty">沒有任務，在下方新增吧</div>`;
  }
}

function taskCardHTML(t, isFixed) {
  const done = isDone(t.id);
  const s = CAT_STYLE[t.cat] || CAT_STYLE['其他'];
  return `<div class="task-card${done?' done':''}" onclick="toggle('${t.id}')">
    <div class="chk">
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
        <path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-name">${t.name}</div>
      <div class="task-badges">
        <span class="badge" style="background:${s.bg};color:${s.color}">${t.cat}</span>
        ${isFixed ? '<span class="badge fixed-badge">每日</span>' : ''}
      </div>
    </div>
    <button class="task-del" onclick="delTask(event,'${t.id}',${isFixed})">×</button>
  </div>`;
}

function toggle(id) { setDone(id, !isDone(id)); render(); }
function setTab(c) { activeTab = c; render(); }

function addTask() {
  const inp = document.getElementById('add-input');
  const cat = document.getElementById('add-cat').value;
  const name = inp.value.trim();
  if (!name) return;
  const id = 't' + Date.now();
  if (addType === 'fixed') {
    D.fixedTasks.push({ id, name, cat });
  } else {
    D.todayTasks.push({ id, name, cat, date: TODAY_STR });
  }
  inp.value = '';
  updateStreakAndHistory();
  save();
  render();
}

function delTask(e, id, isFixed) {
  e.stopPropagation();
  if (isFixed) D.fixedTasks = D.fixedTasks.filter(t=>t.id!==id);
  else D.todayTasks = D.todayTasks.filter(t=>t.id!==id);
  delete D.doneMap[id + '_' + TODAY_STR];
  updateStreakAndHistory();
  save();
  render();
}

document.getElementById('add-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

// ── Stats view ──
function renderStats() {
  const el = document.getElementById('stats-content');
  const allIds = [...D.fixedTasks.map(t=>t.id), ...getTodayTasks().map(t=>t.id)];
  const todayTotal = allIds.length;
  const todayDone = allIds.filter(id=>isDone(id)).length;

  // Week data
  const weekDays = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const s = d.toDateString();
    const h = D.history[s] || { done:0, total:0 };
    weekDays.push({ label: DAYS_ZH[d.getDay()], ...h, isToday: s===TODAY_STR });
  }

  // Cat stats
  const catMap = {};
  D.fixedTasks.forEach(t => {
    if (!catMap[t.cat]) catMap[t.cat] = { total:0, done:0 };
    catMap[t.cat].total++;
    if (isDone(t.id)) catMap[t.cat].done++;
  });

  const totalDaysTracked = Object.keys(D.history).length || 1;
  const totalCompletions = Object.values(D.history).reduce((s,h)=>s+h.done,0);

  el.innerHTML = `
    <div class="stats-header">統計</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-lbl">今日完成</div>
        <div class="stat-num">${todayDone}<span class="stat-unit"> / ${todayTotal}</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">連續打卡</div>
        <div class="stat-num">${D.streak || 0}<span class="stat-unit"> 天</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">累計完成</div>
        <div class="stat-num">${totalCompletions}<span class="stat-unit"> 項</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">追蹤天數</div>
        <div class="stat-num">${totalDaysTracked}<span class="stat-unit"> 天</span></div>
      </div>
    </div>
    <div class="week-grid">
      <div class="week-title">近 7 天完成狀況</div>
      <div class="week-days">
        ${weekDays.map(d => {
          const pct = d.total > 0 ? Math.round(d.done/d.total*100) : 0;
          const cls = d.total===0 ? '' : pct===100 ? ' full' : pct>0 ? ' partial' : '';
          return `<div class="day-dot${cls}${d.isToday?' today-marker':''}">
            <div class="day-lbl">${d.label}</div>
            <div class="day-pct">${d.total>0?pct+'%':'—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${Object.keys(catMap).length ? `
    <div class="cat-stat-list">
      <div class="cat-stat-title">分類完成率（今日固定任務）</div>
      ${Object.entries(catMap).map(([cat,v]) => {
        const pct = v.total>0?Math.round(v.done/v.total*100):0;
        const s = CAT_STYLE[cat]||CAT_STYLE['其他'];
        return `<div class="cat-stat-row">
          <div class="cat-stat-name">${cat}</div>
          <div class="cat-stat-bar-bg"><div class="cat-stat-bar" style="width:${pct}%;background:${s.color}"></div></div>
          <div class="cat-stat-val">${pct}%</div>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

// ── Settings view ──
let addFixedCat = '健康';

function renderSettings() {
  const el = document.getElementById('settings-content');
  el.innerHTML = `
    <div class="settings-header">設定</div>

    <div class="settings-section">
      <div class="settings-section-title">每日固定任務管理</div>
      <div class="fixed-task-list" id="fixed-task-list">
        ${D.fixedTasks.map(t => {
          const s = CAT_STYLE[t.cat]||CAT_STYLE['其他'];
          return `<div class="fixed-task-item">
            <span class="fixed-task-item-name">${t.name}</span>
            <span class="fixed-task-cat" style="background:${s.bg};color:${s.color}">${t.cat}</span>
            <button class="task-del" onclick="delFixed('${t.id}')">×</button>
          </div>`;
        }).join('')}
      </div>
      <div class="add-fixed-row">
        <input class="add-fixed-input" id="fixed-add-input" placeholder="新增固定任務..." autocomplete="off"/>
        <select class="add-select" id="fixed-add-cat" onchange="addFixedCat=this.value">
          <option value="健康">健康</option>
          <option value="工作">工作</option>
          <option value="學習">學習</option>
          <option value="生活">生活</option>
        </select>
        <button class="add-fixed-btn" onclick="addFixedFromSettings()">+</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">應用程式</div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row-icon" style="background:#f2f2ee">📲</div>
          <div class="settings-row-text">
            <div class="settings-row-label">安裝為 App</div>
            <div class="settings-row-sub">加到主畫面，離線也可使用</div>
          </div>
          <button class="settings-btn" id="install-settings-btn" onclick="triggerInstall()">安裝</button>
        </div>
        <div class="settings-row">
          <div class="settings-row-icon" style="background:#f2f2ee">📦</div>
          <div class="settings-row-text">
            <div class="settings-row-label">匯出資料</div>
            <div class="settings-row-sub">下載 JSON 備份檔</div>
          </div>
          <button class="settings-btn" onclick="exportData()">匯出</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">資料</div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row-icon" style="background:#fee2e2">🗑</div>
          <div class="settings-row-text">
            <div class="settings-row-label">清除所有資料</div>
            <div class="settings-row-sub">重設為預設狀態（無法復原）</div>
          </div>
          <button class="settings-btn danger" onclick="clearAll()">清除</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('fixed-add-input').addEventListener('keydown', e => { if(e.key==='Enter') addFixedFromSettings(); });
}

function delFixed(id) {
  D.fixedTasks = D.fixedTasks.filter(t=>t.id!==id);
  save(); render(); renderSettings();
}

function addFixedFromSettings() {
  const inp = document.getElementById('fixed-add-input');
  const cat = document.getElementById('fixed-add-cat').value;
  const name = inp.value.trim();
  if (!name) return;
  D.fixedTasks.push({ id:'f'+Date.now(), name, cat });
  inp.value = '';
  save(); render(); renderSettings();
}

function exportData() {
  const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '每日簽到_備份.json';
  a.click();
}

function clearAll() {
  if (!confirm('確定要清除所有資料？此操作無法復原。')) return;
  localStorage.removeItem(KEY);
  D = load();
  save(); render(); renderSettings();
}

// ── PWA install ──
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.classList.add('show');
});

function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
  } else {
    alert('請在瀏覽器選單中選擇「加到主畫面」來安裝。');
  }
}

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
}

document.getElementById('install-ok-btn').onclick = triggerInstall;

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Init ──
render();
</script>
</body>
</html>
